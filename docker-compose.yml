version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: cro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cro_ideas_board
      MYSQL_USER: cro_user
      MYSQL_PASSWORD: cro_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
